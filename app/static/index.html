<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AQI Monitoring TP.HCM</title>
    <link rel="stylesheet" href="/static/vendor/leaflet.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="map-zone" aria-label="Bản đồ nhiệt AQI TP.HCM">
        <div id="map"></div>

        <header class="topbar">
          <div class="brand">
            <p class="eyebrow">OpenAQ + Spark MLlib</p>
            <h1>AQI TP.HCM</h1>
            <p class="brand-subtitle">PM2.5 / PM10 · Asia/Ho_Chi_Minh</p>
          </div>
          <div class="top-actions">
            <div class="mode-switch" role="group" aria-label="Chế độ hiển thị">
              <button class="mode-button is-active" type="button" data-mode="current">Hiện tại</button>
              <button class="mode-button" type="button" data-mode="forecast">Dự báo</button>
            </div>
            <div class="map-style-switch" role="group" aria-label="Nền bản đồ">
              <button class="map-style-button" type="button" data-basemap="city">TP.HCM</button>
              <button class="map-style-button is-active" type="button" data-basemap="local">Local</button>
            </div>
          </div>
        </header>

        <section class="kpis" aria-label="Tóm tắt dữ liệu">
          <div>
            <span>AQI cao nhất</span>
            <strong id="max-aqi">--</strong>
          </div>
          <div>
            <span>Điểm lưới</span>
            <strong id="point-count">--</strong>
          </div>
          <div>
            <span>Mốc dữ liệu</span>
            <strong id="data-as-of">--</strong>
          </div>
          <div>
            <span>Trạng thái</span>
            <strong id="freshness">--</strong>
          </div>
        </section>

        <aside class="panel" aria-label="Điều khiển bản đồ">
          <div class="panel-head">
            <div>
              <p class="eyebrow" id="mode-eyebrow">Heatmap hiện tại</p>
              <h2 id="panel-title">AQI hiện tại</h2>
            </div>
            <div class="status" id="status">Đang tải...</div>
          </div>
          <p class="artifact-note" id="artifact-note">--</p>

          <div class="forecast-controls" id="forecast-controls">
            <label class="control">
              <span>Mô hình</span>
              <select id="model">
                <option value="random_forest">Random Forest</option>
                <option value="gbt">GBTRegressor</option>
              </select>
            </label>
            <label class="control">
              <span>Horizon <b id="horizon-label">H+1</b></span>
              <input id="horizon" type="range" min="1" max="24" value="1" />
            </label>
          </div>

          <div class="legend" aria-label="Chú giải AQI">
            <span class="good"><b>Tốt</b><small>0-50</small></span>
            <span class="moderate"><b>TB</b><small>51-100</small></span>
            <span class="sensitive"><b>Nhạy cảm</b><small>101-150</small></span>
            <span class="unhealthy"><b>Xấu</b><small>151-200</small></span>
            <span class="severe"><b>Rất xấu</b><small>201+</small></span>
          </div>

          <section class="metrics-strip" aria-label="Chỉ số đánh giá mô hình">
            <div>
              <span>MAE</span>
              <strong id="metric-mae">--</strong>
            </div>
            <div>
              <span>RMSE</span>
              <strong id="metric-rmse">--</strong>
            </div>
            <div>
              <span>R2</span>
              <strong id="metric-r2">--</strong>
            </div>
          </section>

          <section class="hotspot-section" aria-label="Điểm nóng AQI">
            <div class="section-title">
              <span>Hotspots</span>
              <span id="hotspot-context">--</span>
            </div>
            <ol class="hotspots" id="hotspots"></ol>
          </section>
        </aside>
      </section>
    </main>

    <script src="/static/vendor/leaflet.js"></script>
    <script src="/static/vendor/leaflet-heat.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
